<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fylo Data Storage Component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <div class="layout">

      <!-- Left Panel -->
      <div class="panel-left">
        
          
        <img src="./images/logo.svg" class="logo">

        <div class="actions">
          <button class="action-btn1">
          
          </button>
          <button class="action-btn2" >
        
          </button>
          <button class="action-btn3" >
          </button>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="panel-right">
        <p class="storage-text">You've used <span>815 GB</span> of your storage</p>

        <div class="bar-track" role="progressbar" aria-valuenow="81" aria-valuemin="0" aria-valuemax="100" aria-label="Storage usage: 815 GB of 1000 GB used">
          <div class="bar-fill">
            <div class="bar-dot"></div>
          </div>
        </div>

        <div class="bar-labels">
          <span>0 GB</span>
          <span>1000 GB</span>
        </div>

        <div class="remaining-bubble" aria-label="185 GB left">
          <span class="remaining-num">185</span>
          <span class="remaining-label">GB Left</span>
        </div>
      </div>

    </div>

    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="#">Leszek Katapulta</a>.
    </p>
  </div>
</body>
</html>
